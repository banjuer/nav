<!DOCTYPE html>
<html lang="cn">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Van Nav" />
  <meta name="build-version" content="%VITE_BUILD_VERSION%" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="/manifest.json" />
  <script>
    const mode = window.localStorage.getItem("theme");
    if (mode && mode == 'dark') {
      const el = document.querySelector("body");
      if (el) {
        el.classList.toggle("dark-mode", true);
      }
    }
  </script>
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <!-- <title>Van Nav</title> -->
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- 版本控制和缓存清理 -->
  <script>
    (function() {
      const currentVersion = '%VITE_BUILD_VERSION%';
      const storedVersion = localStorage.getItem('app_version');
      
      // 如果版本变化，清理缓存
      if (storedVersion && storedVersion !== currentVersion) {
        console.log('[Van Nav] 版本更新: ' + storedVersion + ' -> ' + currentVersion);
        // 清理 localStorage（保留主题设置）
        const theme = localStorage.getItem('theme');
        localStorage.clear();
        if (theme) localStorage.setItem('theme', theme);
        localStorage.setItem('app_version', currentVersion);
        // 强制刷新（如果是首次加载后的更新）
        if (storedVersion) {
          location.reload(true);
        }
      } else {
        localStorage.setItem('app_version', currentVersion);
      }
    })();
  </script>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
