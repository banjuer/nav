name: DockerBuild And Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 允许写入 GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      # 登录 Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 登录 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 自动提供，无需手动配置

      - name: Get image metadata
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dockerhub_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/nav" >> $GITHUB_OUTPUT
          echo "ghcr_image=ghcr.io/${{ github.repository_owner }}/nav" >> $GITHUB_OUTPUT

      - name: Build and Push to DockerHub & GHCR
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          build-args: |
            CACHE_BUSTER=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          tags: |
            ${{ steps.meta.outputs.dockerhub_image }}:v${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.dockerhub_image }}:latest
            ${{ steps.meta.outputs.ghcr_image }}:v${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.ghcr_image }}:latest

      # 可选：验证镜像（如果遇到同步延迟问题可以注释掉）
      # - name: Verify images
      #   run: |
      #     sleep 10
      #     docker pull ${{ steps.meta.outputs.dockerhub_image }}:v${{ steps.meta.outputs.version }}
      #     docker run --rm ${{ steps.meta.outputs.dockerhub_image }}:v${{ steps.meta.outputs.version }} ls -lh /app/nav
