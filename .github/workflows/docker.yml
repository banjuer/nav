name: DockerBuild And Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: get image name
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          DOCKER_IMAGE_NAME=$(echo "docker.io/banjuer/nav:v${VERSION}")
          DOCKER_IMAGE_NAME_LATEST=$(echo "docker.io/banjuer/nav:latest")
          echo ${VERSION}
          echo "DOCKER_IMAGE_NAME=$DOCKER_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "DOCKER_IMAGE_NAME_LATEST=$DOCKER_IMAGE_NAME_LATEST" >> $GITHUB_OUTPUT
        id: image-name
      - name: Build image And Push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # 禁用缓存，确保每次构建都是全新的
          no-cache: true
          # 传递构建参数
          build-args: |
            CACHE_BUSTER=${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          tags: |
            ${{ steps.image-name.outputs.DOCKER_IMAGE_NAME }}
            ${{ steps.image-name.outputs.DOCKER_IMAGE_NAME_LATEST }}
      - name: Verify image
        run: |
          echo "Checking built image..."
          docker pull ${{ steps.image-name.outputs.DOCKER_IMAGE_NAME }}
          docker run --rm ${{ steps.image-name.outputs.DOCKER_IMAGE_NAME }} ls -lh /app/nav
